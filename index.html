<style>
*{margin:0;padding:0;box-sizing:border-box}

:root {
  --white: #FFFFFF;
  --bg: #FAFAF9;
  --card: #FFFFFF;
  --card-hover: #FEFEFE;
  --border: #F0EDE8;
  --border-2: #E8E4DE;
  --muted: #F5F3F0;
  --muted-2: #EDEAE5;

  --ink: #1C1917;
  --ink-2: #44403C;
  --ink-3: #78716C;
  --ink-4: #A8A29E;
  --ink-5: #D6D3D1;

  --flame: #E8553A;
  --flame-soft: #FEF1EE;
  --flame-hover: #D44A32;

  --emerald: #059669;
  --emerald-soft: #ECFDF5;
  --sky: #0284C7;
  --sky-soft: #F0F9FF;
  --violet: #7C3AED;
  --violet-soft: #F5F3FF;
  --amber: #D97706;
  --amber-soft: #FFFBEB;
  --rose: #E11D48;
  --rose-soft: #FFF1F2;

  --font: 'DM Sans', system-ui, -apple-system, sans-serif;
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 18px;
  --r-xl: 22px;
  --r-pill: 999px;

  --ease: cubic-bezier(.4,0,.2,1);
}

body {
  font-family: var(--font);
  background: #E8E4DE;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  line-height: 1.5;
}

.app {
  max-width: 430px;
  margin: 0 auto;
  background: var(--bg);
  min-height: 100vh;
  position: relative;
  box-shadow: 0 0 60px rgba(0,0,0,0.06);
}

.main { padding-bottom: 76px }

/* ─────── HEADER ─────── */
.hdr {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  background: rgba(250,250,249,0.82);
  backdrop-filter: blur(20px) saturate(1.6);
  -webkit-backdrop-filter: blur(20px) saturate(1.6);
}
.hdr-logo { display:flex; align-items:center; gap:8px }
.hdr-logo svg { width:26px; height:26px }
.hdr-logo span {
  font-size: 18px; font-weight: 700; letter-spacing: -0.6px; color: var(--ink);
}
.hdr-actions { display:flex; gap:4px }
.icon-btn {
  width: 38px; height: 38px; border-radius: 50%;
  display: grid; place-items: center;
  background: transparent; border: 1.5px solid var(--border-2);
  cursor: pointer; transition: all 160ms var(--ease);
  position: relative; color: var(--ink-3);
}
.icon-btn:hover { background: var(--muted); color: var(--ink-2) }
.icon-btn:active { transform: scale(0.92) }
.icon-btn svg { width:18px; height:18px; stroke-width:1.8 }
.badge-dot {
  position:absolute; top:7px; right:7px;
  width:7px; height:7px; border-radius:50%;
  background:var(--flame); border:2px solid var(--bg);
}

/* ─────── BOTTOM NAV ─────── */
.bnav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px; z-index: 50;
  display: flex; padding: 6px 12px 10px;
  background: rgba(255,255,255,0.86);
  backdrop-filter: blur(20px) saturate(1.6);
  -webkit-backdrop-filter: blur(20px) saturate(1.6);
  border-top: 1px solid var(--border);
}
.bnav button {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 6px 0; background: none; border: none; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.bnav button svg { width:20px; height:20px; stroke-width:1.7; color:var(--ink-5); transition:color 160ms var(--ease) }
.bnav button .bl { font-size:10px; font-weight:600; color:var(--ink-4); letter-spacing:0.1px; transition:color 160ms var(--ease) }
.bnav button.on svg { color:var(--flame); stroke-width:2 }
.bnav button.on .bl { color:var(--flame); font-weight:700 }

/* ─────── TYPOGRAPHY ─────── */
.page-head { padding: 20px 20px 6px }
.page-head h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.8px; line-height: 1.15; color: var(--ink) }
.page-head p { font-size: 14px; color: var(--ink-3); margin-top: 4px; font-weight: 400 }
.section-label {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 20px 10px;
}
.section-label h2 { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; color: var(--ink) }
.section-label button { font-size:12px; font-weight:600; color:var(--flame); background:none; border:none; cursor:pointer; font-family:var(--font) }

/* ─────── SEARCH ─────── */
.search-wrap { padding: 6px 20px 8px }
.search-box {
  display: flex; align-items: center; gap: 10px;
  padding: 0 14px; height: 44px;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--r-md); transition: all 160ms var(--ease);
}
.search-box:focus-within { border-color: var(--flame); box-shadow: 0 0 0 3px var(--flame-soft) }
.search-box svg { width:17px; height:17px; color:var(--ink-4); flex-shrink:0; stroke-width:1.8 }
.search-box input {
  flex: 1; border: none; outline: none; background: transparent;
  font-size: 14px; font-family: var(--font); color: var(--ink);
}
.search-box input::placeholder { color: var(--ink-4) }

/* ─────── CHIPS ─────── */
.chip-row { display:flex; gap:7px; padding:4px 20px 12px; overflow-x:auto; scrollbar-width:none }
.chip-row::-webkit-scrollbar { display:none }
.chip-btn {
  flex-shrink: 0; padding: 6px 12px; line-height: 1.15;
  border-radius: 9px; font-size: 12.5px; font-weight: 500;
  border: 1px solid var(--border-2); background: var(--card);
  color: var(--ink-2); cursor: pointer; transition: all 160ms var(--ease);
  font-family: var(--font); white-space: nowrap;
  letter-spacing: -0.005em;
  -webkit-tap-highlight-color: transparent;
}
.chip-btn:active { transform: scale(0.96) }
.chip-btn.on {
  background: var(--ink); color: var(--white); border-color: var(--ink);
}

/* ─────── SIGNAL STRIP ─────── */
.signal-strip {
  display: flex; align-items: center; gap: 10px;
  margin: 0 20px 14px; padding: 11px 14px;
  background: var(--flame-soft); border-radius: var(--r-md);
  font-size: 13px; font-weight: 500; color: var(--flame);
  border: 1px solid rgba(232,85,58,0.08);
}
.signal-strip svg { width:16px; height:16px; flex-shrink:0; stroke-width:2 }

/* ─────── DEAL CARD ─────── */
.deal-card {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--r-xl); margin: 0 20px 14px;
  overflow: hidden; cursor: pointer;
  transition: all 200ms var(--ease);
}
.deal-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.05); border-color: var(--border-2) }
.deal-card:active { transform: scale(0.985) }
.dc-cover {
  position: relative; width: 100%; height: 170px; overflow: hidden;
}
.dc-cover img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform 400ms var(--ease);
}
.deal-card:hover .dc-cover img { transform: scale(1.02) }
.dc-cover-grad {
  position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
  background: linear-gradient(to top, rgba(0,0,0,0.35), transparent);
}
.dc-badge {
  position: absolute; top: 12px; left: 12px;
  padding: 4px 10px; border-radius: var(--r-pill);
  font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
  text-transform: uppercase; backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.dc-badge-new { background: rgba(5,150,105,0.14); color: var(--emerald) }
.dc-badge-hot { background: rgba(225,29,72,0.14); color: var(--rose) }
.dc-badge-closing { background: rgba(217,119,6,0.14); color: var(--amber) }

.dc-save {
  position: absolute; top: 12px; right: 12px;
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,0.8); backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: grid; place-items: center; border: none; cursor: pointer;
}
.dc-save svg { width:16px; height:16px; color:var(--ink-3); stroke-width:1.8 }
.dc-save.saved svg { color:var(--flame); fill:var(--flame) }

.dc-body { padding: 14px 16px 14px }
.dc-brand-row { display:flex; align-items:center; gap:10px; margin-bottom:10px }
.dc-brand-img {
  width: 32px; height: 32px; border-radius: 8px;
  object-fit: cover; border: 1px solid var(--border);
}
.dc-brand-name { font-size: 13px; font-weight: 600; color: var(--ink); letter-spacing: -0.1px }
.dc-brand-type { font-size: 11.5px; color: var(--ink-4); font-weight: 400 }
.dc-title {
  font-size: 16px; font-weight: 700; letter-spacing: -0.4px;
  line-height: 1.35; margin-bottom: 10px; color: var(--ink);
}
.dc-meta { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px }
.dc-meta-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 9px; background: var(--muted); border-radius: 6px;
  font-size: 11px; font-weight: 500; color: var(--ink-3);
}
.dc-meta-tag svg { width:12px; height:12px; stroke-width:1.8 }

.dc-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 12px; border-top: 1px solid var(--border);
}
.dc-pay { font-size: 17px; font-weight: 700; color: var(--emerald); letter-spacing: -0.5px }
.dc-pay span { font-size: 12px; font-weight: 400; color: var(--ink-4) }
.dc-apply {
  padding: 9px 20px; border-radius: var(--r-pill);
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: var(--font); border: none;
  transition: all 160ms var(--ease);
  -webkit-tap-highlight-color: transparent;
}
.dc-apply:active { transform: scale(0.94) }
.dc-apply-active { background: var(--flame); color: var(--white) }
.dc-apply-active:hover { background: var(--flame-hover) }
.dc-apply-done { background: var(--muted); color: var(--ink-4); border: 1px solid var(--border-2) }

/* ─────── STAT CARD ─────── */
.stat-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 20px; margin-bottom:12px }
.stat-card {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--r-lg); padding: 15px;
}
.stat-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px }
.stat-label { font-size: 12px; color: var(--ink-3); font-weight: 500 }
.stat-icon {
  width: 30px; height: 30px; border-radius: 8px;
  display: grid; place-items: center;
}
.stat-icon svg { width:15px; height:15px; stroke-width:1.8 }
.stat-val { font-size: 28px; font-weight: 700; letter-spacing: -1px; line-height: 1 }
.stat-delta { display:flex; align-items:center; gap:3px; font-size:11.5px; font-weight:600; margin-top:5px }
.stat-delta svg { width:13px; height:13px }
.delta-up { color: var(--emerald) }

/* ─────── GAUGE ─────── */
.gauge-card {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--r-lg); padding: 20px; margin: 0 20px 12px;
  text-align: center;
}
.gauge-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.2px }
.gauge-wrap { width:148px; height:148px; margin:0 auto 18px; position:relative }
.gauge-wrap svg { transform:rotate(-90deg) }
.gauge-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center }
.gauge-num { font-size: 36px; font-weight: 700; letter-spacing: -1.5px; color: var(--flame) }
.gauge-sub { font-size: 11px; font-weight: 600; color: var(--ink-4); text-transform:uppercase; letter-spacing:0.5px }
.checklist { display:flex; flex-direction:column; gap:5px; margin-top:16px }
.check-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; background: var(--muted); border-radius: var(--r-sm);
  font-size: 13px; font-weight: 500; color: var(--ink-2);
}
.check-dot {
  width: 20px; height: 20px; border-radius: 50%;
  display: grid; place-items: center; flex-shrink: 0;
}
.check-dot svg { width:12px; height:12px; stroke-width:2.5 }
.check-ok { background: var(--emerald-soft); color: var(--emerald) }
.check-no { background: var(--white); border: 1.5px solid var(--border-2); color: var(--ink-5) }

/* ─────── BRAND VIEWS ─────── */
.bv-card {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--r-lg); margin: 0 20px 12px; overflow: hidden;
}
.bv-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; border-bottom: 1px solid var(--border);
  transition: background 100ms var(--ease);
}
.bv-item:last-child { border-bottom: none }
.bv-item:hover { background: rgba(0,0,0,0.01) }
.bv-img { width:38px; height:38px; border-radius:50%; object-fit:cover; border:1px solid var(--border) }
.bv-info { flex:1 }
.bv-name { font-size:13px; font-weight:600; color:var(--ink); letter-spacing:-0.1px }
.bv-action { font-size:11.5px; color:var(--ink-4) }
.bv-time { font-size:11px; color:var(--ink-5); font-weight:500 }
.blurred { filter:blur(4px); pointer-events:none; user-select:none }

/* ─────── PRO BANNER ─────── */
.pro-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin: 0 20px 12px; padding: 16px;
  background: var(--ink); border-radius: var(--r-lg); color: var(--white);
}
.pro-bar h3 { font-size:14px; font-weight:600; margin-bottom:2px }
.pro-bar p { font-size:12px; color:var(--ink-4) }
.pro-cta {
  padding: 8px 16px; background: var(--flame); color: var(--white);
  border: none; border-radius: var(--r-pill); font-size: 12px;
  font-weight: 600; cursor: pointer; font-family: var(--font); white-space:nowrap;
}

/* ─────── RISING ─────── */
.rising-bar {
  display: flex; gap: 12px; align-items: center;
  margin: 0 20px 12px; padding: 14px 16px;
  background: linear-gradient(135deg, var(--flame) 0%, #F97316 100%);
  border-radius: var(--r-lg); color: var(--white);
}
.rising-bar svg { width:22px; height:22px; flex-shrink:0; stroke-width:2 }
.rising-bar h3 { font-size:14px; font-weight:600; margin-bottom:2px }
.rising-bar p { font-size:12px; opacity:0.8; line-height:1.4 }

/* ─────── MY DEALS ─────── */
.tab-bar { display:flex; padding:0 20px; border-bottom:1px solid var(--border); margin-bottom:14px }
.tab-btn {
  padding: 10px 0; margin-right: 20px;
  font-size: 13px; font-weight: 600; color: var(--ink-4);
  border: none; background: none; cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 160ms var(--ease); font-family: var(--font);
}
.tab-btn.on { color: var(--ink); border-bottom-color: var(--flame) }
.tab-btn .tab-c {
  display: inline-block; padding: 1px 6px; border-radius: var(--r-pill);
  background: var(--muted); font-size: 10px; font-weight: 700; margin-left: 4px;
}
.tab-btn.on .tab-c { background: var(--flame-soft); color: var(--flame) }

.deal-track {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--r-lg); margin: 0 20px 10px; padding: 14px 16px;
}
.dt-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px }
.dt-brand { display:flex; gap:10px; align-items:center }
.dt-img { width:34px; height:34px; border-radius:8px; object-fit:cover; border:1px solid var(--border) }
.dt-name { font-size:13.5px; font-weight:600; letter-spacing:-0.2px }
.dt-deal { font-size:11.5px; color:var(--ink-4) }
.status-pill { padding:4px 10px; border-radius:var(--r-pill); font-size:10.5px; font-weight:600 }
.st-applied { background:var(--sky-soft); color:var(--sky) }
.st-inprogress { background:var(--amber-soft); color:var(--amber) }
.st-completed { background:var(--emerald-soft); color:var(--emerald) }
.progress-track { height:3px; background:var(--muted); border-radius:2px; margin:6px 0; overflow:hidden }
.progress-fill { height:100%; border-radius:2px; transition:width 400ms var(--ease) }
.dt-foot { display:flex; justify-content:space-between; font-size:12px; color:var(--ink-4) }
.dt-foot .earn { font-weight:700; color:var(--emerald) }

/* ─────── SERVICES ─────── */
.svc-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 20px; margin-bottom:14px }
.svc-card {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--r-lg); overflow: hidden; cursor: pointer;
  transition: all 200ms var(--ease);
}
.svc-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.04); border-color: var(--border-2) }
.svc-card:active { transform: scale(0.97) }
.svc-img { width:100%; height:96px; object-fit:cover; display:block }
.svc-body { padding: 12px 12px 14px }
.svc-body h3 { font-size:13.5px; font-weight:700; margin-bottom:2px; letter-spacing:-0.2px }
.svc-body p { font-size:11px; color:var(--ink-4); line-height:1.4; margin-bottom:8px }
.svc-price { font-size:14px; font-weight:700; color:var(--ink) }
.svc-price span { font-size:11px; font-weight:400; color:var(--ink-4) }

/* ─────── PROFILE ─────── */
.prof-header {
  text-align: center; padding: 28px 20px 22px;
  background: var(--card); border-bottom: 1px solid var(--border);
}
.prof-avatar {
  width: 82px; height: 82px; border-radius: 50%;
  background: linear-gradient(135deg, var(--flame), #F97316);
  display: grid; place-items: center;
  font-size: 32px; font-weight: 700; color: var(--white);
  margin: 0 auto 14px;
  box-shadow: 0 6px 20px rgba(232,85,58,0.2);
}
.prof-name { font-size: 22px; font-weight: 700; letter-spacing: -0.6px; margin-bottom: 3px }
.prof-handle { font-size: 13px; color: var(--ink-3); margin-bottom: 10px }
.prof-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 14px; background: var(--flame-soft);
  color: var(--flame); border-radius: var(--r-pill);
  font-size: 12px; font-weight: 600; margin-bottom: 18px;
}
.prof-badge svg { width:13px; height:13px; stroke-width:2 }
.prof-numbers { display:flex; justify-content:center; gap:30px }
.pn-item { text-align:center }
.pn-val { font-size:18px; font-weight:700; letter-spacing:-0.5px }
.pn-label { font-size:11px; color:var(--ink-4); font-weight:500; margin-top:1px }
.prof-section { padding:18px 20px; border-bottom:1px solid var(--border) }
.prof-section h3 { font-size:13px; font-weight:700; letter-spacing:-0.1px; margin-bottom:10px; color:var(--ink) }
.tag-grid { display:flex; flex-wrap:wrap; gap:6px }
.tag-chip { padding:5px 12px; background:var(--muted); border-radius:var(--r-pill); font-size:12px; font-weight:500; color:var(--ink-2) }
.social-row { display:flex; gap:8px; flex-wrap:wrap }
.social-chip { display:flex; align-items:center; gap:6px; padding:8px 14px; background:var(--muted); border-radius:var(--r-sm); font-size:12.5px; font-weight:600 }
.social-chip svg { width:14px; height:14px; stroke-width:1.8 }
.social-chip .scount { color:var(--ink-4); font-weight:400 }
.rate-table { border:1.5px solid var(--border); border-radius:var(--r-md); overflow:hidden }
.rate-row { display:flex; justify-content:space-between; padding:10px 14px; border-bottom:1px solid var(--border); font-size:13px }
.rate-row:last-child { border-bottom:none }
.rate-row .rl { color:var(--ink-3); font-weight:400 }
.rate-row .rv { font-weight:700 }
.collab-list {}
.cl-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border) }
.cl-item:last-child { border-bottom:none }
.cl-img { width:34px; height:34px; border-radius:8px; object-fit:cover; border:1px solid var(--border) }
.cl-name { font-size:13px; font-weight:600 }
.cl-desc { font-size:11px; color:var(--ink-4) }
.prof-actions { display:flex; gap:8px; padding:18px 20px }
.prof-btn {
  flex:1; padding:12px; border-radius:var(--r-md); font-size:13px;
  font-weight:600; cursor:pointer; font-family:var(--font);
  text-align:center; transition:all 160ms var(--ease);
}
.prof-btn:active { transform:scale(0.96) }
.prof-btn-ghost { background:var(--card); border:1.5px solid var(--border-2); color:var(--ink) }
.prof-btn-solid { background:var(--ink); border:none; color:var(--white) }

/* ─────── NOTIFS ─────── */
.notif-list {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--r-lg); margin: 0 20px; overflow: hidden;
}
.notif-item {
  display: flex; gap: 12px; padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  transition: background 100ms var(--ease);
}
.notif-item:last-child { border-bottom:none }
.notif-item:hover { background: rgba(0,0,0,0.01) }
.notif-item.unread { background: var(--flame-soft) }
.ni-icon {
  width: 38px; height: 38px; border-radius: 50%;
  display: grid; place-items: center; font-size: 17px; flex-shrink: 0;
}
.ni-body { flex: 1 }
.ni-body p { font-size: 13px; line-height: 1.45; color: var(--ink-2) }
.ni-body p strong { font-weight: 600; color: var(--ink) }
.ni-body .ni-time { font-size: 11px; color: var(--ink-5); margin-top: 3px }
.ni-dot { width:7px; height:7px; background:var(--flame); border-radius:50%; flex-shrink:0; margin-top:6px }

/* ─────── OVERLAY ─────── */
.overlay { position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; height:100vh; z-index:200 }
.ov-backdrop { position:absolute; inset:0; background:rgba(0,0,0,0.4) }
.ov-sheet {
  position:absolute; bottom:0; left:0; right:0;
  background:var(--card); border-radius:var(--r-xl) var(--r-xl) 0 0;
  max-height:88vh; overflow-y:auto;
  animation: slideUp 300ms var(--ease);
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.ov-handle { width:36px; height:4px; background:var(--border-2); border-radius:2px; margin:10px auto }
.ov-cover { width:100%; height:180px; object-fit:cover; border-radius:0 0 var(--r-md) var(--r-md) }
.ov-body { padding:0 22px 28px }
.ov-brand-row { display:flex; gap:10px; align-items:center; margin:16px 0 }
.ov-brand-img { width:42px; height:42px; border-radius:10px; object-fit:cover; border:1px solid var(--border) }
.ov-brand-name { font-size:15px; font-weight:700 }
.ov-brand-type { font-size:12px; color:var(--ink-4) }
.ov-title { font-size:20px; font-weight:700; letter-spacing:-0.6px; line-height:1.3; margin-bottom:16px }
.ov-section { margin-bottom:16px }
.ov-section h4 { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--ink-4); margin-bottom:5px }
.ov-section p { font-size:14px; line-height:1.65; color:var(--ink-2) }
.ov-stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px }
.ov-stat-box { background:var(--muted); border-radius:var(--r-sm); padding:12px }
.ov-stat-box .osl { font-size:10px; color:var(--ink-4); font-weight:600; text-transform:uppercase; letter-spacing:0.3px; margin-bottom:3px }
.ov-stat-box .osv { font-size:18px; font-weight:700; letter-spacing:-0.5px }
.apply-full {
  width:100%; padding:15px; background:var(--flame); color:var(--white);
  border:none; border-radius:var(--r-md); font-size:15px; font-weight:700;
  cursor:pointer; font-family:var(--font); margin-top:8px;
  transition:all 160ms var(--ease);
}
.apply-full:hover { background:var(--flame-hover) }
.apply-full:active { transform:scale(0.97) }

/* ─────── EMPTY ─────── */
.empty { text-align:center; padding:48px 32px }
.empty svg { width:48px; height:48px; color:var(--ink-5); margin-bottom:14px; stroke-width:1.2 }
.empty h3 { font-size:16px; font-weight:600; margin-bottom:6px }
.empty p { font-size:13px; color:var(--ink-4) }

/* ─────── ANIMATION ─────── */
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation: fadeIn 350ms var(--ease) both }

/* ─────── TOAST ─────── */
.toast-wrap { position: fixed; left: 50%; bottom: 90px; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; max-width: 420px; width: calc(100% - 40px) }
.toast { background: #1C1917; color: #fff; padding: 13px 18px; border-radius: 12px; font-size: 13.5px; font-weight: 500; letter-spacing: -0.005em; box-shadow: 0 12px 30px rgba(0,0,0,0.25); display: flex; align-items: center; gap: 10px; animation: toastIn 280ms var(--ease) both; pointer-events: auto; line-height: 1.4 }
.toast.success { background: linear-gradient(135deg, #10B981, #059669) }
.toast.info    { background: linear-gradient(135deg, #1C1917, #44403C) }
.toast.warn    { background: linear-gradient(135deg, #F59E0B, #D97706) }
.toast.err     { background: linear-gradient(135deg, #DC2626, #991B1B) }
.toast svg { width: 18px; height: 18px; flex-shrink: 0 }
@keyframes toastIn { from{opacity:0;transform:translateY(20px) scale(0.96)} to{opacity:1;transform:translateY(0) scale(1)} }

/* ─────── LOADING ─────── */
.loading-row { display: flex; align-items: center; justify-content: center; padding: 40px 0; color: var(--ink-4); font-size: 14px; gap: 10px }
.spinner { width: 18px; height: 18px; border: 2px solid var(--muted); border-top-color: var(--flame); border-radius: 50%; animation: spin 700ms linear infinite }
@keyframes spin { to { transform: rotate(360deg) } }

/* ─────── MODAL (generic) ─────── */
.modal-back { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 200ms ease }
.modal { background: #fff; border-radius: 20px; padding: 28px 24px; max-width: 380px; width: 100%; box-shadow: 0 30px 60px rgba(0,0,0,0.3); animation: popIn 320ms cubic-bezier(0.34,1.56,0.64,1) }
.modal h3 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px }
.modal p { font-size: 14px; color: var(--ink-3); line-height: 1.5; margin-bottom: 20px }

/* ─────── AUTH / LOGIN ─────── */
.auth-screen {
  min-height: 100vh; background: #FAFAF9; display: flex; flex-direction: column;
  padding: 28px 24px 32px; position: relative; overflow: hidden;
}
.auth-screen::before {
  content:""; position:absolute; top:-120px; right:-120px; width:380px; height:380px;
  background: radial-gradient(circle, rgba(232,85,58,0.12), transparent 70%);
  border-radius: 50%; pointer-events: none;
}
.auth-screen::after {
  content:""; position:absolute; bottom:-160px; left:-160px; width:420px; height:420px;
  background: radial-gradient(circle, rgba(139,92,246,0.08), transparent 70%);
  border-radius: 50%; pointer-events: none;
}
.auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 48px; z-index: 1 }
.auth-logo-mark { width: 38px; height: 38px; border-radius: 10px; background: #E8553A; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 22px; box-shadow: 0 8px 20px rgba(232,85,58,0.25) }
.auth-logo-text { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; color: #1C1917 }

.auth-content { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; z-index: 1 }
.auth-title { font-size: 32px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.1; color: #1C1917; margin-bottom: 10px }
.auth-sub { font-size: 15px; color: #78716C; line-height: 1.5; margin-bottom: 32px }

.phone-row { display: flex; gap: 10px; margin-bottom: 16px }
.phone-cc {
  display: flex; align-items: center; justify-content: center;
  width: 72px; height: 56px; border-radius: 14px;
  background: #fff; border: 1.5px solid #E7E5E4;
  font-size: 15px; font-weight: 600; color: #1C1917; letter-spacing: -0.01em;
}
.phone-input {
  flex: 1; height: 56px; border-radius: 14px; background: #fff;
  border: 1.5px solid #E7E5E4; padding: 0 18px;
  font-size: 17px; font-weight: 500; font-family: inherit; letter-spacing: 0.02em;
  color: #1C1917; outline: none; transition: all 160ms ease;
}
.phone-input:focus, .phone-cc:focus-within { border-color: #E8553A; box-shadow: 0 0 0 4px rgba(232,85,58,0.08) }
.phone-input::placeholder { color: #A8A29E; font-weight: 500 }

.auth-help { font-size: 12.5px; color: #A8A29E; display: flex; align-items: center; gap: 6px; margin-bottom: 24px }
.auth-help svg { width: 14px; height: 14px; color: #10B981 }

.auth-btn {
  width: 100%; height: 56px; border-radius: 14px;
  background: #1C1917; color: #fff; border: none; font-size: 16px; font-weight: 600;
  font-family: inherit; cursor: pointer; letter-spacing: -0.01em;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 180ms ease; box-shadow: 0 8px 20px rgba(28,25,23,0.15);
}
.auth-btn:disabled { background: #D6D3D1; color: #A8A29E; box-shadow: none; cursor: not-allowed }
.auth-btn:not(:disabled):active { transform: scale(0.98) }
.auth-btn.accent { background: #E8553A; box-shadow: 0 8px 20px rgba(232,85,58,0.30) }

.otp-row { display: flex; gap: 10px; margin-bottom: 20px; justify-content: space-between }
.otp-cell {
  flex: 1; aspect-ratio: 1/1.15; max-width: 54px; border-radius: 12px;
  background: #fff; border: 1.5px solid #E7E5E4;
  font-size: 22px; font-weight: 700; text-align: center; color: #1C1917;
  font-family: inherit; outline: none; transition: all 160ms ease;
}
.otp-cell:focus, .otp-cell.filled { border-color: #1C1917; box-shadow: 0 0 0 4px rgba(28,25,23,0.06) }

.auth-timer { font-size: 13px; color: #78716C; text-align: center; margin-bottom: 24px }
.auth-timer strong { color: #1C1917 }
.auth-resend { background: none; border: none; color: #E8553A; font-weight: 600; font-family: inherit; font-size: 13px; cursor: pointer; padding: 0 }
.auth-resend:disabled { color: #A8A29E; cursor: not-allowed }

.auth-back { width: 40px; height: 40px; border-radius: 12px; background: #fff; border: 1px solid #E7E5E4; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 24px; color: #1C1917 }
.auth-back:active { transform: scale(0.96) }

.auth-foot { text-align: center; font-size: 12px; color: #A8A29E; line-height: 1.6; z-index: 1; margin-top: 16px }
.auth-foot a, .auth-foot span { color: #1C1917; font-weight: 600 }

/* splash */
.splash { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; z-index: 1 }
.splash-logo { width: 88px; height: 88px; border-radius: 22px; background: #E8553A; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 46px; margin-bottom: 28px; box-shadow: 0 20px 50px rgba(232,85,58,0.35); animation: popIn 600ms cubic-bezier(0.34, 1.56, 0.64, 1) both }
@keyframes popIn { 0% { transform: scale(0); opacity: 0 } 70% { transform: scale(1.08) } 100% { transform: scale(1); opacity: 1 } }
.splash-title { font-size: 42px; font-weight: 700; letter-spacing: -0.035em; line-height: 1; color: #1C1917; margin-bottom: 12px }
.splash-sub { font-size: 16px; color: #78716C; line-height: 1.5; max-width: 280px; margin: 0 auto 40px }
.splash-cta { width: 100%; max-width: 360px }

/* profile setup */
.ps-avatar-picker { width: 96px; height: 96px; border-radius: 50%; background: #F5F5F4; border: 2px dashed #D6D3D1; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; color: #A8A29E; font-size: 12px; font-weight: 600; cursor: pointer }
.ps-avatar-picker.filled { background: linear-gradient(135deg, #E8553A, #F97316); border: none; color: #fff; font-size: 40px; font-weight: 700 }
.ps-field { margin-bottom: 16px }
.ps-label { font-size: 13px; font-weight: 600; color: #1C1917; margin-bottom: 7px; display: block; letter-spacing: -0.005em }
.ps-input { width: 100%; height: 52px; border-radius: 12px; background: #fff; border: 1.5px solid #E7E5E4; padding: 0 16px; font-size: 15px; font-family: inherit; color: #1C1917; outline: none; transition: all 160ms ease }
.ps-input:focus { border-color: #E8553A; box-shadow: 0 0 0 4px rgba(232,85,58,0.08) }
.ps-niches { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px }
.ps-niche { padding: 7px 13px; border-radius: 9px; background: #fff; border: 1.5px solid #E7E5E4; font-size: 13px; font-weight: 500; color: #44403C; cursor: pointer; transition: all 160ms ease; font-family: inherit }
.ps-niche.on { background: #1C1917; color: #fff; border-color: #1C1917 }
</style>

/* ── API helper ── */
const API = {
  url: () => window.FLUENCE?.API_URL || "",
  async getDeals() {
    if (!this.url()) return null;
    try {
      const r = await fetch(this.url() + "?type=deals");
      const j = await r.json();
      return j.ok ? (j.deals || []) : null;
    } catch (e) { console.warn("Fetch deals failed:", e); return null; }
  },
  async registerCreator(creator) {
    if (!this.url()) return { ok: true, demo: true };
    try {
      const r = await fetch(this.url(), {
        method: "POST", body: JSON.stringify({ action: "register_creator", creator })
      });
      return await r.json();
    } catch (e) { return { ok: false, error: e.message } }
  }
};

/* ── APP ── */
function App(){
  const[authStep,setAuthStep]=useState("splash");
  const[phone,setPhone]=useState("");
  const[otp,setOtp]=useState(["","","","","",""]);
  const[profile,setProfile]=useState({name:"",handle:"",city:"Gwalior",niches:[]});
  const[authLoading,setAuthLoading]=useState(false);
  const[authError,setAuthError]=useState("");
  const[confirmationResult,setConfirmationResult]=useState(null);

  const[tab,setTab]=useState("home");
  const[deals,setDeals]=useState(DEALS);
  const[dealsLoading,setDealsLoading]=useState(false);
  const[filter,setFilter]=useState("All");
  const[sel,setSel]=useState(null);
  const[dtab,setDtab]=useState("all");
  const[q,setQ]=useState("");
  const[toasts,setToasts]=useState([]);
  const[modal,setModal]=useState(null);

  const toast=(msg,kind="info")=>{
    const id=Date.now()+Math.random();
    setToasts(t=>[...t,{id,msg,kind}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3200);
  };
  const hangTight=(feature)=>toast(feature+" — hang tight, we're shipping this super soon ✨","info");

  // Fetch real deals from Apps Script backend
  useEffect(()=>{
    if(authStep!=="done")return;
    (async()=>{
      setDealsLoading(true);
      const fetched=await API.getDeals();
      if(fetched&&fetched.length>0){
        setDeals(fetched.map(normalizeDeal));
        toast(`Loaded ${fetched.length} live deals from Gwalior`,"success");
      }
      setDealsLoading(false);
    })();
  },[authStep]);

  const toggle=(id,key)=>{
    setDeals(ds=>ds.map(d=>d.id===id?{...d,[key]:!d[key]}:d));
    if(key==="saved")toast("Saved to your shortlist","success");
    if(key==="applied")toast("Application sent! Brand will review & revert in 48h ✓","success");
  };
  const fd=deals.filter(d=>(filter==="All"||d.category===filter)&&(!q||(d.brand||"").toLowerCase().includes(q.toLowerCase())||(d.title||"").toLowerCase().includes(q.toLowerCase())));
  const fmd=MYDEALS.filter(d=>dtab==="all"||d.status===dtab);

  /* ── Auth handlers: Firebase Phone Auth if configured, demo fallback otherwise ── */
  const sendOTP=async()=>{
    if(phone.length!==10){setAuthError("Enter a valid 10-digit number");return}
    setAuthError("");setAuthLoading(true);
    try{
      if(window.FLUENCE?.firebaseReady&&window.FLUENCE.auth){
        if(!window.recaptchaVerifier){
          window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier("recaptcha-container",{
            size:"invisible",
            callback:()=>{}
          });
        }
        const confirmation = await window.FLUENCE.auth.signInWithPhoneNumber("+91"+phone, window.recaptchaVerifier);
        setConfirmationResult(confirmation);
        setAuthLoading(false);setAuthStep("otp");
        toast("OTP sent to +91 "+phone,"success");
      } else {
        await new Promise(r=>setTimeout(r,900));
        setAuthLoading(false);setAuthStep("otp");
        toast("Demo mode: any 6-digit OTP works","warn");
      }
    }catch(e){
      console.error(e);setAuthError(e.message||"Could not send OTP. Try again.");setAuthLoading(false);
    }
  };
  const verifyOTP=async()=>{
    const code=otp.join("");
    if(code.length!==6){setAuthError("Enter the 6-digit code");return}
    setAuthError("");setAuthLoading(true);
    try{
      if(confirmationResult){
        await confirmationResult.confirm(code);
      } else {
        await new Promise(r=>setTimeout(r,800));
      }
      setAuthLoading(false);setAuthStep("profile");
    }catch(e){
      setAuthError("Wrong code. Try again or resend.");setAuthLoading(false);
    }
  };
  const completeProfile=async()=>{
    if(!profile.name||!profile.handle||profile.niches.length===0){setAuthError("Fill all fields & pick at least 1 niche");return}
    setAuthError("");setAuthLoading(true);
    const result = await API.registerCreator({
      name: profile.name, phone: "+91"+phone, handle: profile.handle,
      city: profile.city, niches: profile.niches.join(",")
    });
    setAuthLoading(false);
    if(result.ok){setAuthStep("done")}
    else{setAuthError("Signup failed: "+(result.error||"unknown"))}
  };

  if(authStep==="splash")return <Splash onStart={()=>setAuthStep("phone")}/>;
  if(authStep==="phone")return <PhoneAuth phone={phone} setPhone={setPhone} onNext={sendOTP} loading={authLoading} error={authError}/>;
  if(authStep==="otp")return <OTPVerify phone={phone} otp={otp} setOtp={setOtp} onVerify={verifyOTP} onBack={()=>setAuthStep("phone")} onResend={sendOTP} loading={authLoading} error={authError}/>;
  if(authStep==="profile")return <ProfileSetup profile={profile} setProfile={setProfile} onNext={completeProfile} onBack={()=>setAuthStep("otp")} loading={authLoading} error={authError}/>;

  return <div className="app">
    <div className="hdr">
      <div className="hdr-logo">
        <LogoMark size={28}/>
        <span>fluence</span>
      </div>
      <div className="hdr-actions">
        <button className="icon-btn" onClick={()=>setTab("notifications")}>
          <I.bell/><span className="badge-dot"/>
        </button>
      </div>
    </div>

    <div className="main">
      {tab==="home"&&<Home deals={fd} loading={dealsLoading} filters={["All","Food","Fashion","Fitness","Lifestyle"]} filter={filter} setFilter={setFilter} toggle={toggle} setSel={setSel} q={q} setQ={setQ} profile={profile}/>}
      {tab==="stats"&&<Stats hangTight={hangTight}/>}
      {tab==="deals"&&<MyDealsPage deals={fmd} dtab={dtab} setDtab={setDtab} hangTight={hangTight}/>}
      {tab==="services"&&<Services hangTight={hangTight}/>}
      {tab==="profile"&&<Profile profile={profile} phone={phone} hangTight={hangTight} onLogout={()=>{setAuthStep("splash");setPhone("");setOtp(["","","","","",""]);setProfile({name:"",handle:"",city:"Gwalior",niches:[]})}}/>}
      {tab==="notifications"&&<Notifications/>}
    </div>

    <div className="bnav">
      {[{k:"home",icon:I.home,l:"Home"},{k:"stats",icon:I.chart,l:"Signals"},{k:"deals",icon:I.briefcase,l:"My Deals"},{k:"services",icon:I.store,l:"Services"},{k:"profile",icon:I.user,l:"Profile"}].map(n=>
        <button key={n.k} className={tab===n.k?"on":""} onClick={()=>setTab(n.k)}>
          <n.icon/><span className="bl">{n.l}</span>
        </button>
      )}
    </div>

    {sel&&<DetailSheet d={sel} onClose={()=>setSel(null)} onApply={()=>{toggle(sel.id,"applied");setSel(null)}}/>}
    {modal&&<GenericModal {...modal} onClose={()=>setModal(null)}/>}
    <Toaster toasts={toasts}/>
  </div>;
}

function Home({deals,loading,filters,filter,setFilter,toggle,setSel,q,setQ,profile}){
  const firstName=(profile?.name||"").split(" ")[0]||"there";
  const greet=new Date().getHours()<12?"Good morning":new Date().getHours()<17?"Good afternoon":"Good evening";
  return <div className="fade-in">
    <div className="page-head">
      <p style={{fontSize:"13px",color:"var(--ink-4)",fontWeight:"500"}}>{greet}, {firstName}</p>
      <h1>Find your next<br/>brand deal</h1>
    </div>
    <div className="search-wrap"><div className="search-box"><I.search/><input placeholder="Search brands, deals..." value={q} onChange={e=>setQ(e.target.value)}/></div></div>
    <div className="chip-row">
      {filters.map(f=><button key={f} className={"chip-btn"+(filter===f?" on":"")} onClick={()=>setFilter(f)}>{f}</button>)}
      <button className="chip-btn"><I.pin style={{width:12,height:12,display:"inline",verticalAlign:"-2px",marginRight:3}}/>Gwalior</button>
    </div>
    <div className="signal-strip"><I.zap/>3 brands showed interest in your profile this week</div>
    {loading&&<div className="loading-row"><div className="spinner"/>Loading live deals...</div>}
    {!loading&&deals.map((d,i)=><DealCard key={d.id} d={d} toggle={toggle} setSel={setSel} i={i}/>)}

  </div>;
}

function DealCard({d,toggle,setSel,i}){
  const bc=d.badge==="new"?"dc-badge-new":d.badge==="hot"?"dc-badge-hot":"dc-badge-closing";

  return <div className="deal-card fade-in" style={{animationDelay:i*50+"ms"}} onClick={()=>setSel(d)}>
    <div className="dc-cover">
      <img src={d.coverImg} alt={d.brand} loading="lazy"/>
      <div className="dc-cover-grad"/>
      <span className={"dc-badge "+bc}>{bt}</span>
      <button className={"dc-save"+(d.saved?" saved":"")} onClick={e=>{e.stopPropagation();toggle(d.id,"saved")}}>
        <I.heart/>
      </button>
    </div>
    <div className="dc-body">
      <div className="dc-brand-row">
        <img className="dc-brand-img" src={d.brandImg} alt={d.brand}/>
        <div><div className="dc-brand-name">{d.brand}</div><div className="dc-brand-type">{d.brandType} · {d.area}</div></div>

      <div className="dc-title">{d.title}</div>

        <span className="dc-meta-tag"><I.film/>{d.platform}</span>
        <span className="dc-meta-tag">{d.deliverables}</span>
        <span className="dc-meta-tag"><I.users/>{d.followers}</span>
      </div>
      <div className="dc-footer">
        <div className="dc-pay">{d.pay}<span> · Due {d.deadline}</span></div>

      </div>
    </div>
  </div>;

  return <div className="fade-in">

    <div className="rising-bar"><I.rocket/><div><h3>Rising Creator!</h3><p>+24% engagement growth in 30 days. Profile boosted to brands.</p></div></div>

    </div>
    <div className="gauge-card">

      <div className="gauge-wrap">

        {loading?"Sending code...":<>Send OTP<I.arrowR/></>}

    <div id="recaptcha-container"/>

function OTPVerify({phone,otp,setOtp,onVerify,onBack,onResend,loading,error}){
  const refs=useRef([]);
  const[timer,setTimer]=useState(30);
  useEffect(()=>{if(timer<=0)return;const t=setTimeout(()=>setTimer(timer-1),1000);return()=>clearTimeout(t)},[timer]);
  useEffect(()=>{if(refs.current[0])refs.current[0].focus()},[]);
  const setDigit=(i,v)=>{
    v=v.replace(/\D/g,"").slice(-1);
    const next=[...otp];next[i]=v;setOtp(next);
    if(v&&i<5)refs.current[i+1]?.focus();
    if(next.every(x=>x)&&next.join("").length===6){setTimeout(()=>onVerify(),200)}
  };
  const onKey=(i,e)=>{
    if(e.key==="Backspace"&&!otp[i]&&i>0)refs.current[i-1]?.focus();
  };
  const onPaste=(e)=>{
    const data=e.clipboardData.getData("text").replace(/\D/g,"").slice(0,6);
    if(data.length===6){setOtp(data.split(""));setTimeout(()=>onVerify(),200)}
  };
  return <div className="auth-screen">
    <button className="auth-back" onClick={onBack}><I.arrowL/></button>
    <div className="auth-content">
      <h1 className="auth-title">Enter the code</h1>
      <p className="auth-sub">We sent a 6-digit code to <strong style={{color:"#1C1917"}}>+91 {phone}</strong></p>
      <div className="otp-row" onPaste={onPaste}>
        {otp.map((d,i)=><input key={i} ref={el=>refs.current[i]=el} className={"otp-cell"+(d?" filled":"")} type="tel" inputMode="numeric" maxLength="1" value={d} onChange={e=>setDigit(i,e.target.value)} onKeyDown={e=>onKey(i,e)}/>)}
      </div>
      {error&&<p className="auth-help" style={{color:"#E8553A",justifyContent:"center",marginBottom:12}}>{error}</p>}
      <p className="auth-timer">
        {timer>0?<>Resend code in <strong>{timer}s</strong></>:<button className="auth-resend" onClick={()=>{setTimer(30);onResend()}}>Resend code</button>}
      </p>
      <button className="auth-btn" disabled={otp.join("").length!==6||loading} onClick={onVerify}>
        {loading?"Verifying...":<>Verify<I.arrowR/></>}
      </button>
    </div>
    <p className="auth-foot"><span>Didn't get it? Try WhatsApp OTP</span></p>
  </div>;
}

/* ── LOGO MARK (real SVG) ── */
function LogoMark({size=32}){
  return <svg width={size} height={size} viewBox="0 0 56 56" fill="none" style={{display:"block",borderRadius:Math.round(size*0.29)}}>
    <defs>
      <linearGradient id={"flame"+size} x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stopColor="#F97316"/>
        <stop offset="55%" stopColor="#E8553A"/>
        <stop offset="100%" stopColor="#C2410C"/>
      </linearGradient>
    </defs>
    <rect width="56" height="56" rx="16" fill={`url(#flame${size})`}/>
    <path d="M28 11 C34 17, 39 21, 39 29 C39 36, 34 42, 28 42 C22 42, 17 37, 17 30 C17 25, 19 22, 23 19 C22 23, 23 26, 26 27 C25 24, 26 21, 28 18 Z" fill="#FFFFFF" opacity="0.96"/>
    <path d="M28 22 C31 24, 33 27, 33 30 C33 33, 31 35, 28 35 C26 35, 23 33, 23 30 C23 28, 25 27, 26 25 Z" fill={`url(#flame${size})`}/>
  </svg>;
}

/* ── TOASTER ── */
function Toaster({toasts}){
  if(!toasts||!toasts.length)return null;
  return <div className="toast-wrap">
    {toasts.map(t=>{
      const icon=t.kind==="success"?<I.check/>:t.kind==="warn"?<I.zap/>:t.kind==="err"?<I.circle/>:<I.spark/>;
      return <div key={t.id} className={"toast "+t.kind}>{icon}<span>{t.msg}</span></div>;
    })}
  </div>;
}

/* ── Normalize a deal from Google Sheets (fill in missing fields with safe defaults) ── */
function normalizeDeal(d){
  return {
    id: d.id || Math.random().toString(36).slice(2,8),
    brand: d.brand || "Brand",
    brandType: d.brandType || "",
    area: d.area || "",
    brandImg: d.brandImg || "https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=100&h=100&fit=crop",
    coverImg: d.coverImg || d.brandImg || "https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=800&h=400&fit=crop",
    title: d.title || "New brand deal",
    category: d.category || "Food",
    city: d.city || "Gwalior",
    platform: d.platform || "Instagram",
    deliverables: d.deliverables || "1 Reel",
    pay: d.pay || "₹—",
    badge: d.badge || "new",
    deadline: d.deadline || "",
    desc: d.desc || "",
    followers: d.followers || "Any",
    saved: false,
    applied: false
  };
}
