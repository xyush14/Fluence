<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FAFAF9; --card:#fff; --ink:#0C0A09; --ink-2:#292524; --ink-3:#78716C; --ink-4:#A8A29E;
  --border:#F0EDE8; --border-2:#E8E4DE; --muted:#F5F3F0;
  --flame:#E8553A; --flame-2:#C2410C; --flame-soft:#FFF1EC;
  --emerald:#059669; --emerald-soft:#ECFDF5;
  --butter:#FEF3C7; --violet:#DDD6FE; --sky:#BAE6FD; --pink:#FCE7F3; --lime:#D9F99D;
}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:'DM Sans',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px;color:inherit;background:none;border:none;outline:none;width:100%}

/* App shell */
.app{max-width:540px;margin:0 auto;min-height:100vh;position:relative;background:var(--bg);padding-bottom:96px}
.serif{font-family:'Instrument Serif',serif;font-weight:400;font-style:italic}

/* ── Splash / loading ── */
.splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:10}
.splash .logo{width:68px;height:68px;border-radius:18px;background:linear-gradient(135deg,#FF7A4A,#C2410C);display:flex;align-items:center;justify-content:center;margin-bottom:18px;animation:pulse 1.6s ease-in-out infinite}
.splash .logo svg{width:40px;height:40px;color:#fff}
.splash .tag{color:var(--ink-3);font-weight:500;font-size:14px}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:.85}}

/* ── Sign-in screen ── */
.gate{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;background:linear-gradient(180deg,var(--bg) 0%,var(--flame-soft) 100%)}
.gate .mark{width:84px;height:84px;border-radius:22px;background:linear-gradient(135deg,#FF7A4A,#C2410C);display:flex;align-items:center;justify-content:center;margin-bottom:28px;box-shadow:0 20px 50px -20px rgba(232,85,58,.5)}
.gate .mark svg{width:48px;height:48px;color:#fff}
.gate h1{font-size:44px;font-weight:800;letter-spacing:-2px;line-height:1;margin-bottom:14px}
.gate h1 .serif{color:var(--flame);font-size:46px}
.gate p{color:var(--ink-3);font-size:15px;line-height:1.5;max-width:320px;margin:0 auto 36px;font-weight:500}
.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;background:#fff;color:var(--ink);padding:16px 28px;border-radius:999px;font-weight:700;font-size:15px;border:1px solid var(--border-2);box-shadow:0 8px 24px -12px rgba(12,10,9,.2);transition:transform .15s;width:100%;max-width:320px}
.google-btn:active{transform:scale(.98)}
.google-btn svg{width:20px;height:20px}
.gate .foot{margin-top:28px;font-size:12px;color:var(--ink-4);font-weight:500}
.gate .foot a{color:var(--flame);font-weight:600}

/* ── Onboarding ── */
.onboard{min-height:100vh;display:flex;flex-direction:column;padding:24px 20px 120px}
.onboard .hdr{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.onboard .logo-sm{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#FF7A4A,#C2410C);display:flex;align-items:center;justify-content:center}
.onboard .logo-sm svg{width:18px;height:18px;color:#fff}
.onboard h2{font-size:30px;font-weight:800;letter-spacing:-1.2px;line-height:1.05;margin:6px 0 8px}
.onboard .sub{color:var(--ink-3);font-size:14px;line-height:1.5;margin-bottom:28px;font-weight:500}
.field{margin-bottom:18px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--ink-2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.field .input{background:#fff;border:1px solid var(--border-2);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:10px;transition:border-color .15s}
.field .input:focus-within{border-color:var(--flame)}
.field input,.field select,.field textarea{padding:0;font-weight:500}
.field textarea{min-height:80px;resize:vertical;font-size:15px;line-height:1.5}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:10px 14px;border-radius:999px;background:#fff;border:1px solid var(--border-2);font-size:13px;font-weight:600;color:var(--ink-2);transition:all .15s}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.primary-btn{width:100%;background:var(--ink);color:#fff;padding:16px 24px;border-radius:999px;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s,background .15s}
.primary-btn:active{transform:scale(.98)}
.primary-btn:disabled{background:var(--ink-4);cursor:not-allowed}
.primary-btn.flame{background:var(--flame)}
.primary-btn.flame:active{background:var(--flame-2)}

/* ── Header ── */
header.top{padding:20px 20px 8px;display:flex;align-items:center;justify-content:space-between}
header .hello .g{font-size:12px;color:var(--ink-3);font-weight:500}
header .hello .n{font-size:22px;font-weight:800;letter-spacing:-.6px;margin-top:2px}
header .av{width:42px;height:42px;border-radius:12px;background:var(--flame-soft);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--flame);font-size:16px;border:1px solid var(--border-2);overflow:hidden}
header .av img{width:100%;height:100%;object-fit:cover}

/* ── Stat cards ── */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 20px}
.stat{background:#fff;border:1px solid var(--border);border-radius:16px;padding:14px 16px}
.stat .l{font-size:11px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.5px}
.stat .v{font-size:24px;font-weight:800;letter-spacing:-.8px;margin-top:4px}
.stat .v.emerald{color:var(--emerald)}
.stat .sub{font-size:11px;color:var(--ink-4);font-weight:500;margin-top:2px}

/* ── Section title ── */
.sec{display:flex;align-items:center;justify-content:space-between;padding:22px 20px 10px}
.sec h3{font-size:18px;font-weight:800;letter-spacing:-.5px}
.sec .n{font-size:12px;color:var(--ink-3);font-weight:600}

/* ── Deal cards ── */
.deal{background:#fff;border:1px solid var(--border);border-radius:18px;margin:0 20px 12px;overflow:hidden;transition:transform .15s}
.deal:active{transform:scale(.99)}
.deal .cover{height:140px;background:linear-gradient(135deg,#FFF1EC,#FED7AA);position:relative;display:flex;align-items:flex-end;padding:14px}
.deal .cover.v1{background:linear-gradient(135deg,#DBEAFE,#BFDBFE)}
.deal .cover.v2{background:linear-gradient(135deg,#D9F99D,#A7F3D0)}
.deal .cover.v3{background:linear-gradient(135deg,#FCE7F3,#FBCFE8)}
.deal .cover.v4{background:linear-gradient(135deg,#DDD6FE,#C4B5FD)}
.deal .cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.deal .cover .badge{position:relative;z-index:2;background:rgba(255,255,255,.92);backdrop-filter:blur(6px);padding:6px 10px;border-radius:999px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:6px}
.deal .cover .badge .dot{width:6px;height:6px;background:var(--flame);border-radius:50%}
.deal .body{padding:14px 16px}
.deal .brand-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.deal .brand{font-size:14px;font-weight:800}
.deal .niche{font-size:11px;padding:3px 8px;border-radius:999px;background:var(--muted);color:var(--ink-3);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.deal .ttl{font-size:15px;font-weight:700;line-height:1.3;margin-bottom:10px}
.deal .meta{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--ink-3);font-weight:500;margin-bottom:12px}
.deal .meta span{display:inline-flex;align-items:center;gap:5px}
.deal .foot-row{display:flex;align-items:center;justify-content:space-between}
.deal .pay{font-size:18px;font-weight:800;color:var(--emerald);letter-spacing:-.5px}
.deal .pay .sub{font-size:11px;color:var(--ink-3);font-weight:500;margin-left:2px}
.deal .apply{background:var(--ink);color:#fff;padding:10px 16px;border-radius:999px;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:4px;transition:background .15s}
.deal .apply:active{background:var(--flame)}
.deal .apply.done{background:var(--emerald-soft);color:var(--emerald)}

/* ── Empty state ── */
.empty{padding:28px 24px;text-align:center;color:var(--ink-3);font-size:14px;font-weight:500}
.empty .big{font-size:40px;margin-bottom:10px}

/* ── Applications list ── */
.app-row{display:flex;align-items:center;gap:12px;padding:14px 20px;background:#fff;margin:0 20px 10px;border:1px solid var(--border);border-radius:16px}
.app-row .ico{width:40px;height:40px;border-radius:11px;background:var(--flame-soft);color:var(--flame);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0}
.app-row .mid{flex:1;min-width:0}
.app-row .t{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.app-row .s{font-size:12px;color:var(--ink-3);font-weight:500;margin-top:2px}
.app-row .st{font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0}
.st.pending{background:var(--butter);color:#B45309}
.st.approved{background:var(--emerald-soft);color:var(--emerald)}
.st.rejected{background:#FEE2E2;color:#B91C1C}
.st.paid{background:var(--violet);color:#6D28D9}

/* ── Profile ── */
.profile-card{background:#fff;border:1px solid var(--border);border-radius:20px;margin:0 20px;padding:22px;text-align:center;position:relative}
.profile-card .ring{width:84px;height:84px;border-radius:50%;background:linear-gradient(135deg,#FF7A4A,#C2410C);padding:3px;margin:0 auto 14px}
.profile-card .ring .pic{width:100%;height:100%;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:26px;color:var(--flame);overflow:hidden}
.profile-card .ring .pic img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.profile-card .nm{font-size:22px;font-weight:800;letter-spacing:-.6px}
.profile-card .hdl{color:var(--ink-3);font-weight:500;margin-top:2px;font-size:13px}
.profile-card .chips-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:12px}
.profile-card .chip-sm{padding:5px 10px;border-radius:999px;background:var(--muted);font-size:11px;font-weight:600;color:var(--ink-2)}
.profile-actions{padding:14px 20px;display:flex;flex-direction:column;gap:10px}
.row-btn{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:600;color:var(--ink-2);transition:transform .15s}
.row-btn:active{transform:scale(.99)}
.row-btn.danger{color:#B91C1C}

/* ── Tab bar ── */
.tabbar{position:fixed;bottom:0;left:0;right:0;max-width:540px;margin:0 auto;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:1px solid var(--border-2);display:grid;grid-template-columns:repeat(3,1fr);padding:10px 16px 18px;z-index:20}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0;color:var(--ink-4);font-size:11px;font-weight:600;transition:color .15s}
.tab.on{color:var(--flame)}
.tab svg{width:22px;height:22px}

/* ── Modal ── */
.modal{position:fixed;inset:0;background:rgba(12,10,9,.55);backdrop-filter:blur(4px);z-index:30;display:flex;align-items:flex-end;justify-content:center;animation:fade .2s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{background:#fff;width:100%;max-width:540px;border-radius:24px 24px 0 0;padding:24px 22px 36px;animation:slide .25s cubic-bezier(.2,.8,.2,1)}
@keyframes slide{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet .handle{width:40px;height:4px;background:var(--border-2);border-radius:999px;margin:-8px auto 18px}
.sheet h3{font-size:22px;font-weight:800;letter-spacing:-.8px;margin-bottom:6px}
.sheet .sub{color:var(--ink-3);font-size:14px;font-weight:500;margin-bottom:16px}
.sheet .pay-big{font-size:34px;font-weight:800;color:var(--emerald);letter-spacing:-1.2px;margin-bottom:6px}

/* ── Toast ── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-size:13px;font-weight:600;z-index:40;animation:toast-in .25s ease,toast-out .3s ease 2.2s forwards;box-shadow:0 10px 30px -10px rgba(0,0,0,.3)}
@keyframes toast-in{from{opacity:0;transform:translate(-50%,-20px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes toast-out{to{opacity:0;transform:translate(-50%,-20px)}}

/* ── Icons (inline SVG base) ── */
.i{width:16px;height:16px;flex-shrink:0;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none}

/* hide elements */
.hide{display:none!important}
</style>

<script>
// ════════════════════════════════════════════════════════════
// FLUENCE CREATOR APP
// Flow: Auth → Onboarding (first time) → Home / Applications / Profile
// ════════════════════════════════════════════════════════════

const $ = (sel, root = document) => root.querySelector(sel);
const el = (html) => { const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstChild; };
const fmt = (n) => "₹" + Number(n || 0).toLocaleString('en-IN');
const niceDate = (d) => {
  if (!d) return "";
  const x = d.toDate ? d.toDate() : new Date(d);
  const diff = (Date.now() - x.getTime()) / 1000;
  if (diff < 60) return "just now";
  if (diff < 3600) return Math.floor(diff / 60) + "m ago";
  if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
  if (diff < 604800) return Math.floor(diff / 86400) + "d ago";
  return x.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
};
const initials = (name = "") => name.trim().split(/\s+/).slice(0, 2).map(s => s[0] || "").join("").toUpperCase() || "F";

const ICONS = {
  home: '<svg class="i" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2h-4v-7H10v7H6a2 2 0 01-2-2z"/></svg>',
  list: '<svg class="i" viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>',

  tag: '<svg class="i" viewBox="0 0 24 24" style="width:13px;height:13px"><path d="M20 12l-8 8-9-9V3h8z"/><circle cx="7" cy="7" r="1.5"/></svg>',
  wa: '<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor"><path d="M17.5 14.4c-.3-.2-1.8-.9-2.1-1s-.5-.2-.7.2-.8 1-.9 1.2-.3.2-.6 0c-1.8-.9-3-1.6-4.1-3.6-.3-.5.3-.5.8-1.6.1-.2 0-.4 0-.5s-.7-1.6-.9-2.2c-.3-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4s-1 1-1 2.4 1 2.8 1.2 3.1c.2.2 2.1 3.2 5.1 4.5 1.9.7 2.6.8 3.5.6.6-.1 1.8-.7 2-1.5.3-.7.3-1.4.2-1.5-.1-.2-.3-.3-.6-.5zM12 2a10 10 0 00-8.5 15.2L2 22l4.9-1.3A10 10 0 1012 2z"/></svg>',
  google: '<svg viewBox="0 0 24 24"><path fill="#4285F4" d="M21.35 11.1H12v2.9h5.4c-.25 1.5-1.8 4.4-5.4 4.4-3.25 0-5.9-2.7-5.9-6s2.65-6 5.9-6c1.85 0 3.1.8 3.8 1.5l2.6-2.5C16.75 3.8 14.6 3 12 3 6.9 3 2.75 7.15 2.75 12.2S6.9 21.4 12 21.4c6.9 0 9.6-4.85 9.6-7.35 0-.5-.05-.9-.15-1.35z"/></svg>',

  chev: '<svg class="i" viewBox="0 0 24 24" style="width:16px;height:16px"><path d="M9 18l6-6-6-6"/></svg>',

const NICHES = ["Food", "Fashion", "Fitness", "Beauty", "Travel", "Tech", "Lifestyle", "Finance", "Gaming", "Music"];
const CITIES = ["Gwalior", "Indore", "Bhopal", "Jaipur", "Delhi", "Mumbai", "Bangalore", "Other"];

// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
const state = {
  user: null,        // firebase user
  profile: null,     // Firestore users/{uid} doc
  deals: [],
  applications: [],
  tab: "home",
  ui: "splash",      // splash | gate | onboard | app
  authError: null,   // string — shown on the gate if sign-in failed
};

// ════════════════════════════════════════════════════════════
// BACKEND (Apps Script mirror)
// ════════════════════════════════════════════════════════════
async function mirror(action, payload) {
  if (!window.FLUENCE.API_URL) return; // silently skip if not configured
  try {
    await fetch(window.FLUENCE.API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action, payload }),
    });
  } catch (e) { console.warn("Sheet mirror failed", e); }
}

// ════════════════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════════════════
function humanAuthError(code) {
  if (!code) return "Sign-in failed. Please try again.";
  if (code === "auth/unauthorized-domain")
    return "This domain isn't authorized in Firebase. Add fluence.lol, app.fluence.lol and admin.fluence.lol at: Firebase console → Authentication → Settings → Authorized domains.";
  if (code === "auth/popup-blocked")
    return "Your browser blocked the popup. Allow popups for fluence.lol and try again.";
  if (code === "auth/popup-closed-by-user" || code === "auth/cancelled-popup-request")
    return "Sign-in cancelled. Tap the button to try again.";
  if (code === "auth/network-request-failed")
    return "Network error. Check your internet and retry.";
  if (code === "auth/operation-not-allowed")
    return "Google sign-in isn't enabled in Firebase. Enable it in Authentication → Sign-in method → Google.";
  if (code === "auth/internal-error")
    return "Firebase internal error. Check that Google sign-in is enabled and this domain is authorized.";
  return "Sign-in failed: " + code;
}

// Popup-only. Redirect flow silently fails on iOS Safari/Chrome due to third-party cookie
// blocking of fluence-30036.firebaseapp.com. Popup works on all modern mobile browsers.
async function signInWithGoogle() {
  state.authError = null;
  state.ui = "splash";                       // flip to splash so user sees progress
  render();
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ prompt: "select_account" });
  try {
    console.log("[fluence] calling signInWithPopup");
    const result = await auth.signInWithPopup(provider);
    console.log("[fluence] signInWithPopup resolved", !!(result && result.user));
    if (!result || !result.user) {
      state.authError = "Sign-in didn't complete. Try again.";
      state.ui = "gate";
      render();
      return;
    }
    // Drive UI directly from the popup result. Some mobile browsers don't fire
    // onAuthStateChanged reliably after popup on the first load — this guarantees
    // we make forward progress even if the listener is slow.
    await bootUserFlow(result.user);
  } catch (e) {
    console.error("[fluence] sign-in error:", e);
    state.authError = humanAuthError(e.code) + (e.message ? "  ["+e.message+"]" : "");
    state.ui = "gate";
    render();
  }
}

// Shared flow: given a signed-in firebase user, load profile (with timeout) and
// route to onboard or app. Safe to call from onAuthStateChanged OR from the
// signInWithPopup result — whichever arrives first wins, the other is a no-op.
let _bootedUid = null;
async function bootUserFlow(user) {
  if (!user) return;
  if (_bootedUid === user.uid) return;       // already handled
  _bootedUid = user.uid;
  state.user = user;

  let profile = null;
  let firestoreDown = false;
  try {
    profile = await loadProfile(user.uid);
  } catch (e) {
    console.error("[fluence] loadProfile failed:", e);
    firestoreDown = true;
  }

  if (firestoreDown) {
    _bootedUid = null;
    try { await auth.signOut(); } catch (_) {}
    state.user = null;
    state.authError =
      "Signed in, but couldn't reach the database. In Firebase console → Firestore Database → Create Database (Start in test mode), then try again.";
    state.ui = "gate";
    render();
    return;
  }

  if (!profile || !profile.niche) {
    Object.assign(onboardState, {
      name: user.displayName || "",
      city: "Gwalior",
      niche: "",
      instagram: "",
      phone: "",
      bio: "",
    });
    state.ui = "onboard";
    render();
    return;
  }

  state.profile = profile;
  state.ui = "app";
  state.tab = "home";
  render();

  loadDeals().then((deals) => {
    state.deals = deals;
    if (state.ui === "app") render();
  }).catch((e) => console.warn("loadDeals bg:", e));

  loadApplications(user.uid).then((apps) => {
    state.applications = apps;
    if (state.ui === "app") render();
  }).catch((e) => console.warn("loadApplications bg:", e));
}

async function signOut() {
  await auth.signOut();
  state.profile = null;
  state.deals = [];
  state.applications = [];
}

// ════════════════════════════════════════════════════════════
// FIRESTORE (with hard timeouts so the app never hangs)
// ════════════════════════════════════════════════════════════
function withTimeout(promise, ms, label = "firestore") {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error(`${label}_timeout`)), ms)),
  ]);
}

async function loadProfile(uid) {
  const snap = await withTimeout(db.collection("users").doc(uid).get(), 8000, "loadProfile");
  return snap.exists ? snap.data() : null;
}

async function saveProfile(uid, data) {
  const payload = { ...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
  await withTimeout(db.collection("users").doc(uid).set(payload, { merge: true }), 10000, "saveProfile");
  mirror("upsertUser", { uid, ...data }).catch(() => {});
  return payload;
}

async function loadDeals(limit = 5) {
  try {
    const snap = await withTimeout(
      db.collection("deals").where("status", "==", "live").orderBy("createdAt", "desc").limit(limit).get(),
      8000, "loadDeals"
    );
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (e) {
    console.warn("loadDeals primary query failed:", e.message || e);
    try {
      const snap = await withTimeout(db.collection("deals").limit(limit).get(), 8000, "loadDeals2");
      return snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(d => d.status === "live" || !d.status);
    } catch (e2) { console.warn("loadDeals fallback failed:", e2.message || e2); return []; }
  }
}

async function loadApplications(uid) {
  try {
    const snap = await withTimeout(
      db.collection("applications").where("uid", "==", uid).orderBy("createdAt", "desc").limit(30).get(),
      8000, "loadApps"
    );
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (e) {
    console.warn("loadApplications failed:", e.message || e);
    try {
      const snap = await withTimeout(
        db.collection("applications").where("uid", "==", uid).limit(30).get(),
        8000, "loadApps2"
      );
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch (e2) { return []; }
  }
}

async function applyToDeal(deal) {
  const uid = state.user.uid;
  const existing = await db.collection("applications").where("uid", "==", uid).where("dealId", "==", deal.id).limit(1).get();
  if (!existing.empty) {
    toast("You've already applied");
    return;
  }
  const appData = {
    uid,
    dealId: deal.id,
    brand: deal.brand || "",
    title: deal.title || "",
    pay: deal.pay || 0,
    creatorName: state.profile?.name || "",
    creatorHandle: state.profile?.instagram || "",
    creatorPhone: state.profile?.phone || "",
    status: "pending",
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
  };
  const ref = await db.collection("applications").add(appData);
  await mirror("newApplication", { id: ref.id, ...appData, createdAt: new Date().toISOString() });
  toast("Application sent!");
  // refresh applications
  state.applications = await loadApplications(uid);
  if (state.tab === "apps") render();
}

function bindOnboard() {
  $("#f_name")?.addEventListener("input", e => { onboardState.name = e.target.value; refreshSubmit(); });

  $("#f_phone")?.addEventListener("input", e => { onboardState.phone = e.target.value.replace(/\D/g, '').slice(0, 10); e.target.value = onboardState.phone; refreshSubmit(); });
  $("#f_bio")?.addEventListener("input", e => { onboardState.bio = e.target.value; });
  $("#f_city")?.addEventListener("click", e => {
    const btn = e.target.closest('.chip');
    if (!btn) return;
    onboardState.city = btn.dataset.city;
    $$(".chip", $("#f_city")).forEach(c => c.classList.toggle('on', c.dataset.city === onboardState.city));
  });
  $("#f_niche")?.addEventListener("click", e => {
    const btn = e.target.closest('.chip');
    if (!btn) return;
    onboardState.niche = btn.dataset.niche;
    $$(".chip", $("#f_niche")).forEach(c => c.classList.toggle('on', c.dataset.niche === onboardState.niche));
    refreshSubmit();
  });
  $("#f_submit")?.addEventListener("click", submitOnboard);

function refreshSubmit() {
  const ready = onboardState.name.trim() && onboardState.niche && onboardState.instagram.trim() && onboardState.phone.trim().length >= 10;
  const btn = $("#f_submit");
  if (btn) btn.disabled = !ready;
}

async function submitOnboard() {
  const btn = $("#f_submit");
  btn.disabled = true;
  btn.innerHTML = "<span>Creating…</span>";
  try {
    const uid = state.user.uid;
    const profile = {
      name: onboardState.name.trim(),
      email: state.user.email,
      city: onboardState.city,
      niche: onboardState.niche,
      instagram: onboardState.instagram.trim(),
      phone: onboardState.phone.trim(),
      bio: onboardState.bio.trim(),
      avatar: state.user.photoURL || "",
      earnings: 0,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    };
    await saveProfile(uid, profile);
    state.profile = { ...profile, createdAt: new Date() };
    state.ui = "app";
    state.tab = "home";
    render();
    toast("Welcome to Fluence!");
    // Load deals + applications in the background so submit never hangs.
    loadDeals().then(d => { state.deals = d; if (state.ui === "app") render(); }).catch(() => {});
    loadApplications(uid).then(a => { state.applications = a; if (state.ui === "app") render(); }).catch(() => {});
  } catch (e) {
    console.error("saveProfile failed:", e);
    const msg = String(e && e.message || e);
    if (msg.includes("timeout")) {
      toast("Couldn't save — database unreachable. Create Firestore in Firebase console.");
    } else {
      toast("Couldn't save profile. Check your connection and try again.");
    }
    btn.disabled = false;
    btn.innerHTML = "<span>Create my profile</span> <span>→</span>";
  }
}

function openDealSheet(deal) {
  const applied = state.applications.some(a => a.dealId === deal.id);
  const sheet = el(`

        <div class="g">Your</div>
        <div class="n">Profile</div>
      </div>
    </header>

    <div class="profile-card">
      <div class="ring"><div class="pic">${p.avatar ? `<img src="${p.avatar}">` : initials(p.name)}</div></div>
      <div class="nm">${p.name || ""}</div>
      <div class="hdl">@${p.instagram || ""}${p.city ? ` · ${p.city}` : ""}</div>
      <div class="chips-row">
        ${p.niche ? `<div class="chip-sm">${p.niche}</div>` : ""}
        ${p.phone ? `<div class="chip-sm">+91 ${p.phone}</div>` : ""}
      </div>
      ${p.bio ? `<div style="margin-top:14px;font-size:14px;color:var(--ink-2);line-height:1.5;font-weight:500">${p.bio}</div>` : ""}
    </div>

    <div class="stats" style="margin-top:14px">
      <div class="stat">
        <div class="l">Earnings</div>
        <div class="v emerald">${fmt(p.earnings || 0)}</div>
      </div>
      <div class="stat">
        <div class="l">Applications</div>
        <div class="v">${state.applications.length}</div>
      </div>
    </div>

    <div class="profile-actions">
      <a class="row-btn" href="${window.FLUENCE.WHATSAPP_URL}" target="_blank">
        <div style="display:flex;align-items:center;gap:10px;color:#25D366">${ICONS.wa} <span style="color:var(--ink-2)">Chat with Fluence on WhatsApp</span></div>
        ${ICONS.chev}
      </a>
      <button class="row-btn" id="edit-profile">
        <span>Edit profile</span>${ICONS.chev}
      </button>
      <button class="row-btn danger" id="signout">
        <div style="display:flex;align-items:center;gap:10px">${ICONS.logout} <span>Sign out</span></div>
      </button>
    </div>
  `;
}

function bindProfile() {
  $("#signout")?.addEventListener("click", async () => {
    await signOut();
  });
  $("#edit-profile")?.addEventListener("click", () => {
    // Pre-fill onboarding state with current profile and re-show onboarding
    const p = state.profile || {};
    Object.assign(onboardState, {
      name: p.name || "",
      city: p.city || "Gwalior",
      niche: p.niche || "",
      instagram: p.instagram || "",
      phone: p.phone || "",
      bio: p.bio || "",
    });
    state.ui = "onboard";
    render();
  });
}

// ════════════════════════════════════════════════════════════
// TABS
// ════════════════════════════════════════════════════════════
function renderTabs() {
  return `
    <nav class="tabbar">
      <button class="tab ${state.tab === 'home' ? 'on' : ''}" data-tab="home">${ICONS.home}<span>Home</span></button>
      <button class="tab ${state.tab === 'apps' ? 'on' : ''}" data-tab="apps">${ICONS.list}<span>Applications</span></button>
      <button class="tab ${state.tab === 'profile' ? 'on' : ''}" data-tab="profile">${ICONS.user}<span>Profile</span></button>
    </nav>`;
}

function bindTabs() {
  $$(".tab").forEach(t => t.addEventListener("click", () => {
    state.tab = t.dataset.tab;
    render();
  }));
}

// ════════════════════════════════════════════════════════════
// ROOT RENDER
// ════════════════════════════════════════════════════════════
function render() {
  const root = $("#app");
  if (state.ui === "splash") {
    root.innerHTML = renderSplash();
    return;
  }
  if (state.ui === "gate") {
    root.innerHTML = `<div class="app">${renderGate()}</div>`;
    bindGate();
    return;
  }
  if (state.ui === "onboard") {
    root.innerHTML = `<div class="app">${renderOnboard()}</div>`;
    bindOnboard();
    return;
  }
  // main app
  let body = "";
  if (state.tab === "home") body = renderHome();
  else if (state.tab === "apps") body = renderApps();
  else if (state.tab === "profile") body = renderProfile();
  root.innerHTML = `<div class="app">${body}${renderTabs()}</div>`;
  bindTabs();
  if (state.tab === "home") bindHome();
  else if (state.tab === "profile") bindProfile();
}

// ════════════════════════════════════════════════════════════
// AUTH STATE LISTENER (entry point)
// ════════════════════════════════════════════════════════════
state.ui = "splash";
render();

/// Defensive: if someone has a stale redirect flow from an earlier version, catch any error
// from it instead of letting the promise reject silently.
auth.getRedirectResult().catch((e) => {
  console.warn("[fluence] stale redirect result:", e);
});

// Watchdog #1: on first page load, if onAuthStateChanged hasn't fired within 6s
// (Firebase is slow or blocked), drop to gate so the user can sign in.
let _authFired = false;
setTimeout(() => {
  if (!_authFired && state.ui === "splash") {
    console.warn("[fluence] auth watchdog fired — forcing gate");
    state.ui = "gate";
    render();
  }
}, 6000);

// Watchdog #2: if we've been on splash for 15s total (e.g., bootUserFlow hung),
// force-render the gate with an error and a retry.
setTimeout(() => {
  if (state.ui === "splash") {
    console.warn("[fluence] splash watchdog fired — forcing gate");
    state.authError = "Taking too long. Tap sign-in to try again.";
    state.ui = "gate";
    render();
  }
}, 15000);

auth.onAuthStateChanged((user) => {
  _authFired = true;
  console.log("[fluence] onAuthStateChanged:", user ? user.uid : "null");
  if (!user) {
    _bootedUid = null;
    state.user = null;
    state.profile = null;
    state.deals = [];
    state.applications = [];
    if (state.ui !== "gate") {
      state.ui = "gate";
      render();
    }
    return;
  }
  // Defer to the shared bootUserFlow — it's idempotent per-uid, so if
  // signInWithPopup already ran it, this is a no-op.
  bootUserFlow(user);
});
</script>
</body>
</html>
